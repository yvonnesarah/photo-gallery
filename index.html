<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="container">
    <div class="top-bar">
      <h1>Photo Gallery</h1>
      <button id="themeToggle" class="btn small">🌙</button>
    </div>

    <h2>Enter number of photos (1–10)</h2>

    <input type="number" id="input" class="input" value="2" min="1" max="10"/>

    <input type="text" id="search" class="input" placeholder="Search (e.g. cars)" />

    

    <small class="errorMessage" id="errorMessage"></small>

    <div class="quick-tags" style="margin-top:10px;">
      <button class="btn small tag">🌿 Nature</button>
      <button class="btn small tag">🐶 Animals</button>
      <button class="btn small tag">💻 Tech</button>
      <button class="btn small tag">🏙️ City</button>
      <button class="btn small tag">👤 People</button>
    </div>

    <div class="actions">
      <button class="btn" id="btn">Get Photos</button>
      <button class="btn secondary" id="clearBtn">Clear Gallery</button>
      <button class="btn" id="loadMoreBtn">Load More</button>
    </div>

    <p id="searchLabel" style="margin-top:10px;font-weight:bold;"></p>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <span id="closeModal">&times;</span>
    <img id="modalImg" />
  </div>

<script src="assets/js/script.js"></script>
</body>
</html>
